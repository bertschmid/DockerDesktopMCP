services:
  mcp-server:
    image: ${DESKTOP_PLUGIN_IMAGE}
    environment:
      MCP_TLS: ${MCP_TLS:-false}
      MCP_CERT: ${MCP_CERT:-}
      MCP_KEY: ${MCP_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:${MCP_HOST_PORT:-3282}:3282"
    restart: unless-stopped
